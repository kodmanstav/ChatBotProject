services:
   zookeeper:
      image: confluentinc/cp-zookeeper:7.5.0
      container_name: zookeeper
      environment:
         ZOOKEEPER_CLIENT_PORT: 2181
         ZOOKEEPER_TICK_TIME: 2000
      ports:
         - '2181:2181'
      healthcheck:
         test: ['CMD', 'nc', '-z', 'localhost', '2181']
         interval: 10s
         timeout: 5s
         retries: 10

   kafka:
      image: confluentinc/cp-kafka:7.5.0
      container_name: kafka
      depends_on:
         zookeeper:
            condition: service_healthy
      ports:
         - '9092:9092'
      environment:
         KAFKA_BROKER_ID: 1
         KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
         KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
         KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
         KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
         KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
         KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      healthcheck:
         test:
            [
               'CMD',
               'kafka-broker-api-versions',
               '--bootstrap-server',
               'localhost:9092',
            ]
         interval: 10s
         timeout: 10s
         retries: 10

   kafka-init:
      image: confluentinc/cp-kafka:7.5.0
      container_name: kafka-init
      depends_on:
         kafka:
            condition: service_healthy
      entrypoint: ['/bin/sh', '-c']
      command: |
         echo "Waiting for Kafka to be ready..."
         sleep 5
         kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw-reviews-topic --partitions 1 --replication-factor 1
         kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic processed-insights-topic --partitions 1 --replication-factor 1
         kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic user-commands --partitions 1 --replication-factor 1
         kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic conversation-events --partitions 1 --replication-factor 1
         kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic tool-invocation-requests --partitions 1 --replication-factor 1
         kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dead-letter-queue --partitions 1 --replication-factor 1
         echo "Topics created."
      restart: 'no'

   router:
      build:
         context: .
         dockerfile: Dockerfile
      command: bun run router
      env_file:
         - .env
      environment:
         KAFKA_BROKERS: kafka:29092
      volumes:
         - .:/app
         - /app/node_modules
      depends_on:
         kafka-init:
            condition: service_completed_successfully
      restart: unless-stopped

   orchestrator:
      build:
         context: .
         dockerfile: Dockerfile
      command: bun run orchestrator
      env_file:
         - .env
      environment:
         KAFKA_BROKERS: kafka:29092
